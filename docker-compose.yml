services:
  postgres:
    image: postgres:15.4
    environment:
      POSTGRES_USER: contract
      POSTGRES_PASSWORD: contract
      POSTGRES_DB: contracts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract -d contracts"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://contract:contract@postgres:5432/contracts
      REDIS_URL: redis://redis:6379/0
    volumes:
      - contract_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://contract:contract@postgres:5432/contracts
      REDIS_URL: redis://redis:6379/0
    volumes:
      - contract_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://api:8000}

volumes:
  postgres_data:
  contract_storage:
